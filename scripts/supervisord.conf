[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid

[program:nginx]
command=/usr/sbin/nginx -g "daemon off;"
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:backend]
command=uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2
directory=/app/backend
autostart=true
autorestart=true
environment=OPSPILOT_DATABASE_URL="%(ENV_OPSPILOT_DATABASE_URL)s",OPSPILOT_SECRET_KEY="%(ENV_OPSPILOT_SECRET_KEY)s",OPSPILOT_DEPLOY_BASE_PATH="%(ENV_OPSPILOT_DEPLOY_BASE_PATH)s",OPSPILOT_LOG_LEVEL="%(ENV_OPSPILOT_LOG_LEVEL)s",OPSPILOT_CORS_ORIGINS="%(ENV_OPSPILOT_CORS_ORIGINS)s"
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
